name: Nyx Patch CI

on:
  pull_request:
    branches: [nyx-patches]
  workflow_dispatch:

concurrency:
  group: nyx-patch-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflows
        uses: rhysd/actionlint@v1.7.12

  patch-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Select patch test targets
        id: test_targets
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          mapfile -t changed_tests < <(git diff --name-only "$base_sha" "$head_sha" -- tests | grep -E '^tests/.+\.py$' | sort -u || true)

          if [ "${#changed_tests[@]}" -gt 0 ]; then
            echo "mode=changed-tests" >> "$GITHUB_OUTPUT"
            {
              echo 'targets<<EOF'
              printf '%s\n' "${changed_tests[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "mode=smoke-suite" >> "$GITHUB_OUTPUT"
            {
              echo 'targets<<EOF'
              echo 'tests/cli/test_cli_provider_resolution.py'
              echo 'tests/hermes_cli/test_api_key_providers.py'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Run patch test suite
        run: |
          source .venv/bin/activate
          echo "Patch CI mode: ${{ steps.test_targets.outputs.mode }}"
          echo "Targets:"
          printf '%s\n' "${{ steps.test_targets.outputs.targets }}"
          python -m pytest -q --tb=short -n auto ${{ steps.test_targets.outputs.targets }}
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
