name: Nyx Sync Upstream Main

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

permissions:
  contents: write

concurrency:
  group: nyx-sync-main
  cancel-in-progress: false

jobs:
  sync-main:
    if: github.repository == 'protocol-nyx/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout durable control plane
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: nyx-patches

      - name: Sync main from upstream via GitHub fork sync
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: scripts/nyx/sync_main_from_upstream.sh
